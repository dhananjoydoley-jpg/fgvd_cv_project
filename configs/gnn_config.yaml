# configs/gnn_config.yaml

# Input
image_size: 64             # crops resized to 64x64 (from paper)

# Features  (can combine: rgb, gabor, sobel)
features: [rgb, gabor, sobel]   # best combo per Table II (RGB+Gabor+Sobel @ L-1)
rgb_channels: 3
gabor_wavelength: 6.0
gabor_frequency: 1.0
gabor_gamma: 1.0
gabor_orientations: [0, 45, 90, 135]   # degrees

# Graph
graph_connectivity: 8-neighbour        # 4 or 8

# SGCN Architecture (from paper §IV)
hidden_channels: 64
filter_size: 3
num_layers: 3
activation: relu
dropout: 0.5

# Training
epochs: 100
batch_size: 8
accumulation_steps: 4
num_workers: 0
amp: true
save_period: 10
lr: 0.001
optimizer: adam
weight_decay: 0.0

# Late fusion (YOLO box + confidence + one-hot cls) with pooled graph embedding — see src/graph/detector_feats.py
# For training with real vectors, generate crop_metadata.json via infer_yolo on train/val image roots.
late_fusion:
  enabled: true
  det_feat_dim: 9          # log rel area, log aspect, conf, + 6 one-hot YOLO classes
  fusion_hidden: 64
  train_metadata_json: data/processed/crops/train/crop_metadata.json
  val_metadata_json: data/processed/crops/val/crop_metadata.json

# Output
project: runs/gnn
name: fgvd_sgcn_fusion
save_best: true
