# configs/detection.yaml
# YOLOv8-nano training configuration for FGVD

model: yolov8n.pt          # YOLOv8-nano pretrained checkpoint
data: data/fgvd.yaml

# Training
epochs: 100
imgsz: 640
batch: 10
device: 0                  # GPU id; "cpu" for CPU-only
workers: 2
amp: true

# Optimizer
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1

# Output
project: runs/detect
name: fgvd_yolov8n
save: true
save_period: 10
